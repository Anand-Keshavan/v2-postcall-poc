  /search/issues:
    get:
      operationId: searchIssues
      summary: Search GitHub issues and pull requests
      description: |
        Search issues and pull requests across GitHub using a query string.
        Supports qualifiers: org:, repo:, author:, assignee:, state:, type:issue, type:pr, label:, in:title.
      x-agent-guidance:
        - "search for issues mentioning {topic}"
        - "find open issues in {org_name} org"
        - "search github issues about {keyword}"
        - "find bugs labeled {label} in {org_name}"
        - "search for pull requests in {org_name}"
        - "find issues created by {username}"
        - "search closed issues in {repo_name}"
      parameters:
        - name: q
          in: query
          required: true
          description: |
            Search query. Supports qualifiers:
            - org:{org} — issues in an org
            - repo:{owner}/{repo} — issues in a specific repo
            - author:{login} — issues by a user
            - assignee:{login} — issues assigned to a user
            - state:open or state:closed
            - type:issue or type:pr
            - label:{name} — filter by label
            - in:title — search in title only
          schema:
            type: string
          example: "org:postmanlabs type:issue state:open"
        - name: sort
