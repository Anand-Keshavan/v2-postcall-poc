openapi: 3.0.3
info:
  title: GitHub REST API (OAS++ Enhanced)
  version: 2.0.0-oas-plus
  description: |
    GitHub REST API with PostCall OAS++ extensions for agent-ready operations.

    This spec includes:
    - x-postcall-auth-discovery: Machine-readable auth metadata
    - x-postcall-provisioning-url: Where to get API tokens
    - x-postcall-grounding: Resolver chains for natural language to IDs
    - x-agent-guidance: Example queries for RAG indexing

    Grounding patterns:
      Pattern A (org name → org login):
        Step 1: searchRepos(q: "org:{org_name}") → items[0].owner.login
      Pattern B (repo name → owner + repo):
        Step 1: getAuthenticatedUser() → login
        Step 2: searchRepos(q: "{repo_name} in:name user:{login}") → owner, repo

  x-postcall-auth-discovery:
    type: token
    scheme: bearer
    token_type: personal_access_token
    documentation_url: https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens
    scopes:
      repo: Full control of private repositories
      read:user: Read user profile data
      user:email: Access user email addresses
      read:org: Read organization membership and details
    env_vars:
      token: GITHUB_TOKEN

  x-postcall-provisioning-url: https://github.com/settings/tokens/new?description=PostCall&scopes=repo,read:user,user:email,read:org
  x-postcall-auth-notes: |
    IMPORTANT: You must create a CLASSIC Personal Access Token (not Fine-Grained).
    Fine-Grained PATs return empty results for /user/repos unless repos are explicitly
    selected during token creation. Classic PATs with 'repo' scope return all accessible
    repositories automatically.
    Steps: github.com → Settings → Developer settings → Personal access tokens → Tokens (classic) → Generate new token (classic)

servers:
  - url: https://api.github.com
    description: GitHub REST API v3

paths:

  # ── User ──────────────────────────────────────────────────────────────────────

  /user:
    get:
      operationId: getAuthenticatedUser
      summary: Get authenticated user
      description: Get profile information about the currently authenticated user including login, name, email, and public repo count.
      x-agent-guidance:
        - "who am I on github"
        - "show my github profile"
        - "get my user info"
        - "what is my github username"
        - "show my account details"
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  login:
                    type: string
                    description: GitHub username
                  id:
                    type: integer
                  name:
                    type: string
                  email:
                    type: string
                  bio:
                    type: string
                  public_repos:
                    type: integer
                  followers:
                    type: integer
                  following:
                    type: integer
                  html_url:
                    type: string
                  created_at:
                    type: string

  /users/{username}:
    get:
      operationId: getUser
      summary: Get a specific GitHub user
      description: Get public profile information for any GitHub user by their username.
      x-agent-guidance:
        - "get info about github user {username}"
        - "show profile for {username}"
        - "look up github user {username}"
        - "who is {username} on github"
        - "find github profile for {name}"
        - "show {name}'s github account"

      x-postcall-entity-hints:
        user_name: "The name or GitHub username (can be display name like 'John Doe' or login like 'torvalds')"

      x-postcall-grounding:
        steps:
          - operationId: searchUsers
            description: "Resolve human name or partial username to exact GitHub login"
            parameters:
              q: "{{intent.user_name}} in:login,name type:user"
            extract:
              username: "items[0].login"
            required: false
            error_message: "Could not find a GitHub user matching '{{intent.user_name}}'."

      parameters:
        - name: username
          in: path
          required: true
          description: GitHub username to look up
          schema:
            type: string
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  login:
                    type: string
                  name:
                    type: string
                  bio:
                    type: string
                  public_repos:
                    type: integer
                  followers:
                    type: integer
                  html_url:
                    type: string

  # ── Organizations ─────────────────────────────────────────────────────────────

  /user/orgs:
    get:
      operationId: listUserOrgs
      summary: List organizations for the authenticated user
      description: List all organizations the authenticated user belongs to, including both public and private memberships.
      x-agent-guidance:
        - "list my organizations"
        - "show my github orgs"
        - "what organizations am I part of"
        - "which github organizations do I belong to"
        - "show all my github organizations"
        - "list orgs I am a member of"
      parameters:
        - name: per_page
          in: query
          schema:
            type: integer
            default: 30
            maximum: 100
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    login:
                      type: string
                      description: Organization login name
                    id:
                      type: integer
                    description:
                      type: string
                    url:
                      type: string
                    repos_url:
                      type: string
                    avatar_url:
                      type: string

  /orgs/{org}:
    get:
      operationId: getOrg
      summary: Get organization details
      description: Get detailed information about a GitHub organization including member count, public repos, location, and description.

      x-agent-guidance:
        - "get info about {org_name} organization"
        - "show details of {org_name} org"
        - "describe the {org_name} github organization"
        - "what is the {org_name} organization"

      x-postcall-entity-hints:
        org_name: "The name or login of the GitHub organization the user is asking about"

      # GROUNDING CHAIN (Pattern A): org name → org login
      x-postcall-grounding:
        steps:
          - operationId: searchUsers
            description: "Resolve org name to exact GitHub org login"
            parameters:
              q: "{{intent.org_name}} type:org"
            extract:
              org: "items[0].login"
            required: true
            error_message: "Could not find a GitHub organization matching '{{intent.org_name}}'. Try the exact slug (e.g. 'postmanlabs' not 'Postman Labs')."

      parameters:
        - name: org
          in: path
          required: true
          description: Organization login name (resolved via grounding from org_name)
          schema:
            type: string
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                type: object
                properties:
                  login:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                  public_repos:
                    type: integer
                  members_url:
                    type: string
                  html_url:
                    type: string
                  location:
                    type: string
                  email:
                    type: string
                  created_at:
                    type: string

  /orgs/{org}/members:
    get:
      operationId: listOrgMembers
      summary: List members of an organization
      description: List all public members of a GitHub organization.

      x-agent-guidance:
        - "list members of {org_name} organization"
        - "who is in the {org_name} org"
        - "show members of {org_name}"
        - "who belongs to {org_name} github organization"
        - "list people in {org_name}"

      x-postcall-entity-hints:
        org_name: "The name or login of the GitHub organization to list members of"

      # GROUNDING CHAIN (Pattern A): org name → org login
      x-postcall-grounding:
        steps:
          - operationId: searchUsers
            description: "Resolve org name to exact GitHub org login"
            parameters:
              q: "{{intent.org_name}} type:org"
            extract:
              org: "items[0].login"
            required: true
            error_message: "Could not find a GitHub organization matching '{{intent.org_name}}'. Try the exact slug (e.g. 'postmanlabs' not 'Postman Labs')."

      parameters:
        - name: org
          in: path
          required: true
          description: Organization login name (resolved via grounding)
          schema:
            type: string
        - name: per_page
          in: query
          schema:
            type: integer
            default: 30
            maximum: 100
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: List of organization members
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    login:
                      type: string
                    id:
                      type: integer
                    avatar_url:
                      type: string
                    html_url:
                      type: string
                    type:
                      type: string

  # ── Repositories ──────────────────────────────────────────────────────────────

  /user/repos:
    get:
      operationId: listUserRepos
      summary: List repositories for the authenticated user
      description: List all repositories the authenticated user has access to, including private repos.
      x-agent-guidance:
        - "list my repositories"
        - "show my github repos"
        - "what repos do I have"
        - "show all my repositories"
        - "list my github projects"
      parameters:
        - name: sort
          in: query
          schema:
            type: string
            enum: [created, updated, pushed, full_name]
            default: updated
        - name: per_page
          in: query
          schema:
            type: integer
            default: 30
            maximum: 100
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: List of repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    full_name:
                      type: string
                    private:
                      type: boolean
                    description:
                      type: string
                    html_url:
                      type: string
                    language:
                      type: string
                    stargazers_count:
                      type: integer
                    open_issues_count:
                      type: integer
                    updated_at:
                      type: string
                    owner:
                      type: object
                      properties:
                        login:
                          type: string

  /orgs/{org}/repos:
    get:
      operationId: listOrgRepos
      summary: List repositories in an organization
      description: List all repositories belonging to a GitHub organization.

      x-agent-guidance:
        - "list repos in {org_name} organization"
        - "show all repositories for {org_name}"
        - "what repos does {org_name} have"
        - "find repositories in {org_name} org"
        - "show {org_name} organization repositories"
        - "list projects in {org_name}"

      x-postcall-entity-hints:
        org_name: "The name or login of the GitHub organization to list repositories for"

      # GROUNDING CHAIN (Pattern A): org name → org login
      x-postcall-grounding:
        steps:
          - operationId: searchUsers
            description: "Resolve org name to exact GitHub org login"
            parameters:
              q: "{{intent.org_name}} type:org"
            extract:
              org: "items[0].login"
            required: true
            error_message: "Could not find a GitHub organization matching '{{intent.org_name}}'. Try the exact slug (e.g. 'postmanlabs' not 'Postman Labs')."

      parameters:
        - name: org
          in: path
          required: true
          description: Organization login name (resolved via grounding from org_name)
          schema:
            type: string
        - name: type
          in: query
          description: Filter by repo type
          schema:
            type: string
            enum: [all, public, private, forks, sources, member]
            default: all
        - name: sort
          in: query
          schema:
            type: string
            enum: [created, updated, pushed, full_name]
            default: updated
        - name: per_page
          in: query
          schema:
            type: integer
            default: 30
            maximum: 100
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: List of organization repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    full_name:
                      type: string
                    private:
                      type: boolean
                    description:
                      type: string
                    html_url:
                      type: string
                    language:
                      type: string
                    stargazers_count:
                      type: integer
                    open_issues_count:
                      type: integer
                    updated_at:
                      type: string

  /repos/{owner}/{repo}:
    get:
      operationId: getRepo
      summary: Get a repository
      description: Get detailed information about a specific repository by owner and repo name.

      x-agent-guidance:
        - "get info about {repo_name} repository"
        - "show details of {repo_name} repo"
        - "describe the {repo_name} repository"
        - "what is the {repo_name} github project"

      x-postcall-entity-hints:
        repo_name: "The name of the GitHub repository (can be in any org or owned by any user; supports owner/repo format)"

      # GROUNDING CHAIN (Pattern B): repo name → owner + repo
      x-postcall-grounding:
        steps:
          - operationId: searchRepos
            description: "Search for the repository by name, excluding forks to reduce noise"
            parameters:
              q: "{{intent.repo_name}} in:name fork:false"
            extract:
              owner: "items[0].owner.login"
              repo: "items[0].name"
            required: true
            error_message: "Could not find a repository named '{{intent.repo_name}}'. Use the exact name (e.g. 'postcall-poc' not 'postcall poc')."

      parameters:
        - name: owner
          in: path
          required: true
          description: Repository owner login (resolved via grounding)
          schema:
            type: string
        - name: repo
          in: path
          required: true
          description: Repository name (resolved via grounding)
          schema:
            type: string
      responses:
        '200':
          description: Repository details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  full_name:
                    type: string
                  description:
                    type: string
                  private:
                    type: boolean
                  html_url:
                    type: string
                  language:
                    type: string
                  stargazers_count:
                    type: integer
                  forks_count:
                    type: integer
                  open_issues_count:
                    type: integer
                  default_branch:
                    type: string
                  created_at:
                    type: string
                  updated_at:
                    type: string

  /search/repositories:
    get:
      operationId: searchRepos
      summary: Search GitHub repositories
      description: Search repositories across GitHub using a query string. Supports qualifiers like user:, org:, language:, in:name, stars:>N.
      x-agent-guidance:
        - "search for {repo_name} repository"
        - "find repos named {repo_name}"
        - "look up {repo_name} repo on github"
        - "search github for {repo_name}"
        - "find repositories matching {query}"
      parameters:
        - name: q
          in: query
          required: true
          description: |
            Search query. Supports qualifiers:
            - user:{login} — repos owned by a user
            - org:{org} — repos in an org
            - in:name — search in repo name
            - language:{lang} — filter by language
            - stars:>N — filter by star count
          schema:
            type: string
          example: "postcall org:postmanlabs"
        - name: sort
          in: query
          schema:
            type: string
            enum: [stars, forks, updated]
        - name: per_page
          in: query
          schema:
            type: integer
            default: 30
            maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        full_name:
                          type: string
                        description:
                          type: string
                        html_url:
                          type: string
                        stargazers_count:
                          type: integer
                        language:
                          type: string
                        owner:
                          type: object
                          properties:
                            login:
                              type: string

  /search/users:
    get:
      operationId: searchUsers
      summary: Search GitHub users and organizations
      description: |
        Search GitHub users and organizations by login or display name.
        Use type:org to restrict to organizations only.
        Use type:user to restrict to individual user accounts.
        Use in:login,name to match against both slug and display name.
        Returns items[].{login, type, name, html_url}.
      x-agent-guidance:
        - "find github user {username}"
        - "look up {name} on github"
        - "search for github org {org_name}"
        - "find organization named {org_name}"
        - "who is {name} on github"
      parameters:
        - name: q
          in: query
          required: true
          description: |
            Search query. Qualifiers:
            - type:org — organizations only
            - type:user — individual accounts only
            - in:login,name — match slug OR display name
          schema:
            type: string
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
            maximum: 100
      responses:
        '200':
          description: User/org search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        login:
                          type: string
                          description: Exact GitHub slug (used in API paths)
                        type:
                          type: string
                          description: "User or Organization"
                        name:
                          type: string
                          description: Display name
                        html_url:
                          type: string

  # ── Issues ────────────────────────────────────────────────────────────────────

  /issues:
    get:
      operationId: listMyIssues
      summary: List issues for the authenticated user
      description: List all issues assigned to, created by, or mentioning the authenticated user across all repositories they have access to.
      x-agent-guidance:
        - "list my issues"
        - "show issues assigned to me"
        - "what issues do I have"
        - "show all my open issues"
        - "list issues created by me"
        - "show my github issues"
      parameters:
        - name: filter
          in: query
          description: Which issues to return (assigned, created, mentioned, subscribed, all)
          schema:
            type: string
            enum: [assigned, created, mentioned, subscribed, repos, all]
            default: assigned
        - name: state
          in: query
          schema:
            type: string
            enum: [open, closed, all]
            default: open
        - name: sort
          in: query
          schema:
            type: string
            enum: [created, updated, comments]
            default: created
        - name: per_page
          in: query
          schema:
            type: integer
            default: 30
            maximum: 100
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: List of issues
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    number:
                      type: integer
                    title:
                      type: string
                    state:
                      type: string
                    html_url:
                      type: string
                    repository_url:
                      type: string
                    user:
                      type: object
                      properties:
                        login:
                          type: string
                    created_at:
                      type: string
                    updated_at:
                      type: string
                    body:
                      type: string

  /orgs/{org}/issues:
    get:
      operationId: listOrgIssues
      summary: List issues for an organization
      description: List all open issues across all repositories in a GitHub organization.

      x-agent-guidance:
        - "list issues in {org_name} organization"
        - "show open issues for {org_name} org"
        - "find bugs in {org_name} organization"
        - "what issues exist in {org_name}"
        - "show all issues across {org_name} repos"
        - "list {org_name} organization issues"

      x-postcall-entity-hints:
        org_name: "The name or login of the GitHub organization to list issues for"

      # GROUNDING CHAIN (Pattern A): org name → org login
      x-postcall-grounding:
        steps:
          - operationId: searchUsers
            description: "Resolve org name to exact GitHub org login"
            parameters:
              q: "{{intent.org_name}} type:org"
            extract:
              org: "items[0].login"
            required: true
            error_message: "Could not find a GitHub organization matching '{{intent.org_name}}'. Try the exact slug (e.g. 'postmanlabs' not 'Postman Labs')."

      parameters:
        - name: org
          in: path
          required: true
          description: Organization login name (resolved via grounding from org_name)
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
            enum: [open, closed, all]
            default: open
        - name: sort
          in: query
          schema:
            type: string
            enum: [created, updated, comments]
            default: created
        - name: per_page
          in: query
          schema:
            type: integer
            default: 30
            maximum: 100
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: List of issues in the organization
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    number:
                      type: integer
                    title:
                      type: string
                    state:
                      type: string
                    html_url:
                      type: string
                    repository_url:
                      type: string
                    user:
                      type: object
                      properties:
                        login:
                          type: string
                    created_at:
                      type: string

  /repos/{owner}/{repo}/issues:
    get:
      operationId: listIssues
      summary: List repository issues
      description: List issues in a specific repository. Supports filtering by state, assignee, and labels.
      x-context-scope: user
      x-agent-guidance:
        - "list issues in {repo_name}"
        - "show bugs in {repo_name}"
        - "show me issues in my {repo_name} repo"
        - "what issues are open in {repo_name}"
        - "find open issues in {repo_name} repository"
        - "list all issues for {repo_name}"

      x-postcall-entity-hints:
        repo_name: "The name of the GitHub repository (can be in any org or owned by any user; supports owner/repo format)"

      # GROUNDING CHAIN (Pattern B): repo name → owner + repo
      x-postcall-grounding:
        steps:
          - operationId: searchRepos
            description: "Search for the repository by name, excluding forks to reduce noise"
            parameters:
              q: "{{intent.repo_name}} in:name fork:false"
            extract:
              owner: "items[0].owner.login"
              repo: "items[0].name"
            required: true
            error_message: "Could not find a repository named '{{intent.repo_name}}'. Use the exact name (e.g. 'postcall-poc' not 'postcall poc')."

      parameters:
        - name: owner
          in: path
          required: true
          description: Repository owner (resolved via grounding)
          schema:
            type: string
        - name: repo
          in: path
          required: true
          description: Repository name (resolved via grounding)
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
            enum: [open, closed, all]
            default: open
        - name: assignee
          in: query
          description: Filter by assignee username
          schema:
            type: string
        - name: labels
          in: query
          description: Comma-separated list of label names to filter by
          schema:
            type: string
        - name: per_page
          in: query
          schema:
            type: integer
            default: 30
            maximum: 100
      responses:
        '200':
          description: List of issues
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    number:
                      type: integer
                    title:
                      type: string
                    state:
                      type: string
                    html_url:
                      type: string
                    user:
                      type: object
                      properties:
                        login:
                          type: string
                    labels:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                    created_at:
                      type: string

  /repos/{owner}/{repo}/issues/{issue_number}:
    get:
      operationId: getIssue
      summary: Get a specific issue
      description: Get full details of a single issue in a repository including body, comments count, labels, and assignees.

      x-agent-guidance:
        - "get issue #{issue_number} in {repo_name}"
        - "show issue {issue_number} from {repo_name}"
        - "details of issue {issue_number} in {repo_name}"
        - "what is issue {issue_number} about in {repo_name}"

      x-postcall-entity-hints:
        repo_name: "The name of the GitHub repository (can be in any org or owned by any user; supports owner/repo format)"
        issue_number: "The numeric issue number to retrieve"

      # GROUNDING CHAIN (Pattern B): repo name → owner + repo
      x-postcall-grounding:
        steps:
          - operationId: searchRepos
            description: "Search for the repository by name, excluding forks to reduce noise"
            parameters:
              q: "{{intent.repo_name}} in:name fork:false"
            extract:
              owner: "items[0].owner.login"
              repo: "items[0].name"
            required: true
